<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexScout | Estudio Jurídico Tecnológico</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1a2a44;
            --secondary: #c5a059;
            --light: #f4f4f4;
            --dark: #333;
            --whatsapp: #25d366;
            --whatsapp-alt: #075e54;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; color: var(--dark); line-height: 1.6; }
        
        /* CABECERA Y HERO */
        header { background: var(--primary); color: white; padding: 2rem 5%; text-align: center; }
        .hero { background: linear-gradient(rgba(26,42,68,0.85), rgba(26,42,68,0.85)), url('https://images.unsplash.com/photo-1589829545856-d10d557cf95f?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80'); 
                height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; text-align: center; background-size: cover; }
        .hero h1 { font-size: 3.5rem; margin-bottom: 0.5rem; letter-spacing: 2px; }
        .hero p { font-size: 1.2rem; max-width: 600px; margin-bottom: 2rem; }

        /* ESTILO BOTONES FLOTANTES CON ETIQUETAS */
        .wa-container {
            position: fixed;
            right: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        .wa-container:hover { transform: scale(1.05); }
        
        .wa-button {
            width: 60px;
            height: 60px;
            color: #FFF;
            border-radius: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }
        
        .wa-label {
            background: white;
            color: var(--dark);
            padding: 8px 15px;
            border-radius: 20px;
            margin-right: 15px;
            font-weight: bold;
            font-size: 14px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: nowrap;
        }

        /* POSICIONES */
        .wa-martinez { bottom: 30px; }
        .wa-magnasciutti { bottom: 105px; }
        
        /* COLORES */
        .bg-martinez { background-color: var(--whatsapp); }
        .bg-magnasciutti { background-color: var(--whatsapp-alt); }

        /* SECCIONES */
        .services { padding: 5rem 5%; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; background: var(--light); }
        .service-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 5px solid var(--secondary); text-align: center; }
        .service-card i { font-size: 2.5rem; color: var(--primary); margin-bottom: 1.5rem; }
        .cta-button { background: var(--secondary); color: white; padding: 1.2rem 2.5rem; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 1.1rem; }
        footer { background: var(--primary); color: white; text-align: center; padding: 3rem; }
    </style>
</head>
<body>

    <section class="hero">
        <h1>LexScout</h1>
        <p>Innovación jurídica y vigilancia inteligente de causas en tiempo real.</p>
        <a href="#contacto" class="cta-button">Iniciar Consulta</a>
    </section>
